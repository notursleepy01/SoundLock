name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Gradle installation (no gradlew) ────────────────────────────────────
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms and build tools
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      # Cache Android SDK packages (slow to download, rarely change)
      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/platforms/android-35
          key: android-sdk-35
          restore-keys: android-sdk-35

      # Cache Gradle dependencies (~/.gradle/caches + wrapper dists)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-deps-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts') }}
          restore-keys: |
            gradle-deps-

      # Cache Gradle build outputs (incremental build speedup)
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/buildOutputCleanup
          key: gradle-build-cache-${{ github.sha }}
          restore-keys: |
            gradle-build-cache-

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --build-cache --parallel
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostyX-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
